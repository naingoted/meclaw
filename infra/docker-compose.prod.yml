name: meclaw
services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [chat, admin]

  # Runs pending Drizzle migrations to completion, then exits. Apps depend on it
  # via service_completed_successfully so they never start against an unmigrated
  # DB; a failed migrate (exit!=0) blocks dependents and fails the deploy loudly.
  migrations:
    image: ghcr.io/${GHCR_OWNER}/meclaw-ops:${IMAGE_TAG:-latest}
    restart: "no"
    env_file: .env
    command: ["pnpm", "--filter", "@meclaw/core", "db:migrate"]
    depends_on:
      postgres:
        condition: service_healthy

  chat:
    image: ghcr.io/${GHCR_OWNER}/meclaw-chat:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      # Corpus is bind-mounted, not baked into the image. Anchor the content
      # loader to the mount path (the image runs from /app). The /resume route
      # reads content/resume.md from here.
      MECLAW_CONTENT_DIR: /app/content
    expose: ["3000"]
    volumes:
      - ../content:/app/content:ro
    depends_on:
      ai:
        condition: service_started
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  admin:
    image: ghcr.io/${GHCR_OWNER}/meclaw-admin:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    expose: ["3000"]
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  ai:
    image: ghcr.io/${GHCR_OWNER}/meclaw-ai:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    expose: ["8000"]
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      migrations:
        condition: service_completed_successfully

  ollama:
    image: ollama/ollama:0.3.14
    restart: unless-stopped
    expose: ["11434"]
    volumes: ["ollama_storage:/root/.ollama"]

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-meclaw}
    expose: ["5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meclaw} -d ${POSTGRES_DB:-meclaw}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes: ["pgdata:/var/lib/postgresql/data"]

  ops:
    image: ghcr.io/${GHCR_OWNER}/meclaw-ops:${IMAGE_TAG:-latest}
    profiles: ["tools"]
    env_file: .env
    environment:
      MECLAW_CONTENT_DIR: /app/content
    volumes:
      # Full corpus (knowledge/*.md + PDFs at the content root) — ingest reads
      # the whole content tree, not just knowledge/. Work-impact packs, if any,
      # live in a sibling ../data dir; mount it here too when present.
      - ../content:/app/content:ro
    depends_on: [postgres, ollama]

volumes:
  ollama_storage:
  pgdata:
  caddy_data:
  caddy_config:
