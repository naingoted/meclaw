# Dokploy deployment stack for meclaw.
#
# Differs from docker-compose.prod.yml: NO Caddy. Dokploy's bundled Traefik owns
# :80/:443 and issues Let's Encrypt certs. Public services (chat, admin) join the
# external `dokploy-network` and carry Traefik labels pinning their host + TLS;
# everything else stays on the private `internal` network (service-name DNS).
#
# Deploy model: Dokploy pulls the CI-built amd64 images from GHCR (no on-box
# builds — 3 Next builds beside Ollama would OOM an 8GB host). Set env in the
# Dokploy app UI (it writes the .env this file reads). GHCR pull creds: add a
# registry in Dokploy, or make the packages public.
#
# Domains (hardcoded — public DNS names, not secrets):
#   meclaw.leanior.com        -> chat  (:3000)
#   meclaw-admin.leanior.com  -> admin (:3000)
name: meclaw
services:
  chat:
    image: ghcr.io/${GHCR_OWNER}/meclaw-chat:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      MECLAW_CONTENT_DIR: /app/content
    expose: ["3000"]
    volumes:
      - ../content:/app/content:ro
    networks: [internal, dokploy-network]
    depends_on:
      ai:
        condition: service_started
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      # https
      - traefik.http.routers.meclaw-chat.rule=Host(`meclaw.leanior.com`)
      - traefik.http.routers.meclaw-chat.entrypoints=websecure
      - traefik.http.routers.meclaw-chat.tls.certresolver=letsencrypt
      - traefik.http.services.meclaw-chat.loadbalancer.server.port=3000
      # http -> https redirect
      - traefik.http.routers.meclaw-chat-web.rule=Host(`meclaw.leanior.com`)
      - traefik.http.routers.meclaw-chat-web.entrypoints=web
      - traefik.http.routers.meclaw-chat-web.middlewares=meclaw-https
      - traefik.http.middlewares.meclaw-https.redirectscheme.scheme=https

  admin:
    image: ghcr.io/${GHCR_OWNER}/meclaw-admin:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    expose: ["3000"]
    networks: [internal, dokploy-network]
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      # https
      - traefik.http.routers.meclaw-admin.rule=Host(`meclaw-admin.leanior.com`)
      - traefik.http.routers.meclaw-admin.entrypoints=websecure
      - traefik.http.routers.meclaw-admin.tls.certresolver=letsencrypt
      - traefik.http.services.meclaw-admin.loadbalancer.server.port=3000
      # http -> https redirect (reuse the meclaw-https middleware)
      - traefik.http.routers.meclaw-admin-web.rule=Host(`meclaw-admin.leanior.com`)
      - traefik.http.routers.meclaw-admin-web.entrypoints=web
      - traefik.http.routers.meclaw-admin-web.middlewares=meclaw-https

  ai:
    image: ghcr.io/${GHCR_OWNER}/meclaw-ai:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    expose: ["8000"]
    networks: [internal]
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      migrations:
        condition: service_completed_successfully

  # Shared across ALL meclaw stacks (owner + customers): embeddings are
  # stateless, one nomic-embed-text instance serves everyone (~0.5-1GB RAM
  # saved per customer). Customer stacks reach it on the external
  # `meclaw-shared` network as http://meclaw-ollama-shared:11434.
  ollama:
    image: ollama/ollama:0.3.14
    restart: unless-stopped
    expose: ["11434"]
    networks:
      internal: {}
      meclaw-shared:
        aliases: [meclaw-ollama-shared]
    volumes: ["ollama_storage:/root/.ollama"]

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-meclaw}
    expose: ["5432"]
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meclaw} -d ${POSTGRES_DB:-meclaw}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes: ["pgdata:/var/lib/postgresql/data"]
    labels:
      # Marker for backup script discovery — Dokploy overrides compose project
      # name with its own compose-<id>, so we can't rely on project label matching.
      - com.meclaw.backup=true

  # One-shot DB migrator. Runs on every deploy BEFORE chat/admin/ai start
  # (they gate on service_completed_successfully). Reuses the ops image but has
  # NO profile, so a plain `up -d` runs it. Idempotent — drizzle skips applied
  # migrations via __drizzle_migrations. restart "no" so it exits and stays
  # exited; a failed migrate (exit!=0) blocks dependents → deploy fails loudly
  # instead of serving against an unmigrated DB.
  migrations:
    image: ghcr.io/${GHCR_OWNER}/meclaw-ops:${IMAGE_TAG:-latest}
    restart: "no"
    env_file: .env
    command: ["pnpm", "--filter", "@meclaw/core", "db:migrate"]
    networks: [internal]
    depends_on:
      postgres:
        condition: service_healthy

  ops:
    image: ghcr.io/${GHCR_OWNER}/meclaw-ops:${IMAGE_TAG:-latest}
    profiles: ["tools"]
    env_file: .env
    environment:
      MECLAW_CONTENT_DIR: /app/content
    networks: [internal]
    volumes:
      - ../content:/app/content:ro
    depends_on: [postgres, ollama]

networks:
  internal: {}
  dokploy-network:
    external: true
  # Operator must `docker network create meclaw-shared` on the box before deploy
  # (one-time box setup — see deploy.md §4b). Compose won't create it (external: true);
  # if missing, `docker compose up` aborts with "network meclaw-shared not found".
  # Rationale (shared embedding instance for customer stacks): docs/ai/customer-ops.md.
  meclaw-shared:
    external: true

volumes:
  ollama_storage:
  pgdata:
