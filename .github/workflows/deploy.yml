name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  quality:
    uses: ./.github/workflows/quality-gate.yml
    with:
      fallow-base: ${{ github.event.before }}

  build:
    needs: quality
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Lowercase GHCR owner
        id: owner
        run: echo "lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push chat
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/chat/Dockerfile
          target: runner
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-chat:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-chat:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push admin
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/admin/Dockerfile
          target: runner
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-admin:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-admin:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push ai
        if: ${{ hashFiles('services/ai/Dockerfile') != '' }}
        uses: docker/build-push-action@v7
        with:
          context: ./services/ai
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-ai:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-ai:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push ops
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/Dockerfile.ops
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-ops:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-ops:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy redeploy
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}"
