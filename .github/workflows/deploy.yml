name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  quality:
    uses: ./.github/workflows/quality-gate.yml
    with:
      fallow-base: ${{ github.event.before }}

  build:
    needs: quality
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Lowercase GHCR owner
        id: owner
        run: echo "lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push chat
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/chat/Dockerfile
          target: runner
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-chat:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-chat:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push admin
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/admin/Dockerfile
          target: runner
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-admin:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-admin:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push ai
        if: ${{ hashFiles('services/ai/Dockerfile') != '' }}
        uses: docker/build-push-action@v7
        with:
          context: ./services/ai
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-ai:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-ai:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push ops
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/Dockerfile.ops
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-ops:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-ops:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  migrate:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Run DB migrations on EC2
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DOKPLOY_APP_NAME: ${{ secrets.DOKPLOY_APP_NAME }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh -o StrictHostKeyChecking=no -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" bash << EOF
            set -e
            COMPOSE="/etc/dokploy/compose/${DOKPLOY_APP_NAME}/code/infra/docker-compose.dokploy.yml"
            sudo docker pull "ghcr.io/naingoted/meclaw-ops:${IMAGE_TAG}"
            sudo env IMAGE_TAG="${IMAGE_TAG}" docker compose \
              -p "${DOKPLOY_APP_NAME}" -f "\$COMPOSE" \
              --profile tools run --rm ops \
              pnpm --filter @meclaw/core db:migrate
          EOF
