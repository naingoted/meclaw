name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase GHCR owner
        id: owner
        run: echo "lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-web:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push ingest
        uses: docker/build-push-action@v6
        with:
          context: .
          target: builder
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-ingest:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-ingest:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push ai (Phase 3)
        if: ${{ hashFiles('services/ai/Dockerfile') != '' }}
        uses: docker/build-push-action@v6
        with:
          context: ./services/ai
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-ai:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-ai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            cd /opt/meclaw
            git pull --ff-only
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml exec -T ollama ollama pull nomic-embed-text
            docker compose -f docker-compose.prod.yml run --rm ingest pnpm ingest
            docker image prune -f
