name: Deploy

on:
  push:
    tags: ['v*']

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  quality:
    uses: ./.github/workflows/quality-gate.yml
    with:
      fallow-base: ${{ github.event.before }}

  build:
    needs: quality
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Lowercase GHCR owner
        id: owner
        run: echo "lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push chat
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/chat/Dockerfile
          target: runner
          push: true
          build-args: |
            GIT_SHA=${{ github.sha }}
            MECLAW_VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-chat:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-chat:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-chat:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push admin
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/admin/Dockerfile
          target: runner
          push: true
          build-args: |
            GIT_SHA=${{ github.sha }}
            MECLAW_VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-admin:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-admin:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-admin:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push ai
        if: ${{ hashFiles('services/ai/Dockerfile') != '' }}
        uses: docker/build-push-action@v7
        with:
          context: ./services/ai
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-ai:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-ai:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-ai:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push ops
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/Dockerfile.ops
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-ops:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-ops:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.lc }}/meclaw-ops:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    # Prod deploy runs by default on a tag. Set repo variable SKIP_PROD_DEPLOY=true
    # to publish images for a tag WITHOUT touching prod (build-only release), then
    # unset it to restore normal behavior.
    if: ${{ startsWith(github.ref, 'refs/tags/') && vars.SKIP_PROD_DEPLOY != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy the released tag to the EC2 Caddy stack over SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          # Write the deploy key + pin the host key (no interactive prompt).
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${SSH_PORT:-22}" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # The remote runs as a non-root user that owns /opt/meclaw and is in the
          # docker group, so no sudo is needed. IMAGE_TAG expands locally into the
          # command; the quoted heredoc body is sent verbatim and reads it from the
          # remote environment.
          ssh -i ~/.ssh/deploy_key -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" \
            "IMAGE_TAG='${IMAGE_TAG}' bash -seuo pipefail" <<'REMOTE'
          cd /opt/meclaw

          # 1. Move the checkout to the released tag — picks up compose, Caddyfile,
          #    migrations, and the bundled content corpus. -f discards any drift in
          #    tracked files; the gitignored infra/.env is untouched.
          git fetch --tags --prune origin
          git checkout -f "refs/tags/${IMAGE_TAG}"

          # 2. Pin IMAGE_TAG in the env file so pull/up use the released images.
          if grep -q '^IMAGE_TAG=' infra/.env; then
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${IMAGE_TAG}|" infra/.env
          else
            printf 'IMAGE_TAG=%s\n' "${IMAGE_TAG}" >> infra/.env
          fi

          # 3. Pull released images, then converge. The `migrations` service runs to
          #    completion before chat/admin/ai start (service_completed_successfully),
          #    so apps never serve against an unmigrated DB.
          cd infra
          # Reclaim disk BEFORE pulling. A full root volume makes `pull` fail to
          # extract layers ("no space left on device"). Drop images and build
          # cache not used by a running container — the live stack's images are
          # kept, so this is safe and only frees superseded tags.
          docker image prune -af
          docker builder prune -af
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d --remove-orphans
          # Containers now run the new images, so the previous release's tags are
          # unused. Prune ALL unused images (-a, not just dangling) so disk stays
          # flat across releases instead of growing one image-set per deploy.
          # Running containers keep their images; the stopped one-shot migrations
          # container keeps meclaw-ops.
          docker image prune -af
          REMOTE

      - name: Verify deploy convergence
        if: ${{ vars.PROD_CHAT_URL != '' }}
        env:
          PROD_CHAT_URL: ${{ vars.PROD_CHAT_URL }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 600 ))   # 10 minutes
          while [ "$(date +%s)" -lt "$deadline" ]; do
            got=$(curl -sS "${PROD_CHAT_URL}/api/health" | jq -r '.sha // ""' || true)
            echo "health sha=${got} expected=${EXPECTED_SHA}"
            if [ "$got" = "$EXPECTED_SHA" ]; then
              echo "deploy converged to ${EXPECTED_SHA}"
              exit 0
            fi
            sleep 10
          done
          echo "::error::deploy did not converge to ${EXPECTED_SHA} within 10m"
          exit 1
