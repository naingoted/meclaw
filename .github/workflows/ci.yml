name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: meclaw
          POSTGRES_PASSWORD: meclaw
          POSTGRES_DB: meclaw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U meclaw"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://meclaw:meclaw@localhost:5432/meclaw

    steps:
      - uses: actions/checkout@v4

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Migrate (Postgres)
        run: pnpm db:migrate

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          ANTHROPIC_API_KEY: dummy-ci-key
          ANTHROPIC_BASE_URL: https://example.invalid/anthropic
          ANTHROPIC_MODEL: qwen3.6-plus
