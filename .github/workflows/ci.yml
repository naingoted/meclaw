name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    uses: ./.github/workflows/quality-gate.yml
    with:
      fallow-base: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || github.event.before }}
      fetch-base-ref: ${{ github.event_name == 'pull_request' && github.base_ref || '' }}
