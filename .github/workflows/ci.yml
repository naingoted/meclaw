name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    uses: ./.github/workflows/quality-gate.yml
    with:
      fallow-base: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || github.event.before }}
      fetch-base-ref: ${{ github.event_name == 'pull_request' && github.base_ref || '' }}
  security:
    uses: ./.github/workflows/security.yml
    with:
      commit-range-from: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
      commit-range-to: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}
