name: Security (scheduled)

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit
        run: pnpm audit --audit-level=high

  semgrep:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Semgrep
        run: |
          python -m pip install semgrep==1.165.0
          semgrep scan --error \
            --config p/javascript \
            --config p/typescript \
            --config p/react \
            --config p/owasp-top-ten
