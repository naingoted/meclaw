name: Security

on:
  workflow_call:
    inputs:
      commit-range-from:
        required: false
        type: string
        default: ""
      commit-range-to:
        required: false
        type: string
        default: ""

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Secret scan (repo)
        run: pnpm exec secretlint --maskSecrets --secretlintignore .secretlintignore "**/*"

      - name: Conventional commits (PR range)
        if: ${{ inputs.commit-range-from != '' }}
        env:
          COMMIT_FROM: ${{ inputs.commit-range-from }}
          COMMIT_TO: ${{ inputs.commit-range-to }}
        run: pnpm exec commitlint --from "$COMMIT_FROM" --to "$COMMIT_TO"

      - name: Dependency audit
        run: pnpm audit --audit-level=high

      - name: Semgrep
        run: |
          python -m pip install --upgrade semgrep
          semgrep scan --error \
            --config p/javascript \
            --config p/typescript \
            --config p/react \
            --config p/owasp-top-ten
