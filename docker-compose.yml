services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.3.14
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    restart: unless-stopped

  ai:
    build: ./services/ai
    ports:
      - "8000:8000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # Base URL may carry a trailing /v1 (TS-style); the Python provider strips
      # it (langchain-anthropic appends /v1/messages itself).
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-qwen3.6-plus}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-meclaw_knowledge}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      RAG_TOP_K: ${RAG_TOP_K:-4}
    depends_on:
      - qdrant
      - ollama
    restart: unless-stopped

  # Next app, containerized with hot-reload. `dev:full` runs the whole stack in
  # Docker, but `web` runs `next dev` with the repo bind-mounted — edit locally,
  # HMR reflects at localhost:3000 with no rebuild. Talks to the sidecar over the
  # compose network (http://ai:8000). For a VPS-parity build use docker-compose.prod.yml.
  web:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    environment:
      AI_SERVICE_URL: http://ai:8000
    volumes:
      - .:/app                 # live source from the host
      - /app/node_modules      # keep the container's linux-built deps
      - /app/.next             # keep the container's build cache
      - sqlite_data:/app/data
    depends_on:
      - ai
    restart: unless-stopped

volumes:
  qdrant_storage:
  ollama_storage:
  sqlite_data:
