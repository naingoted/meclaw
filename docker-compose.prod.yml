services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

  web:
    image: ghcr.io/${GHCR_OWNER}/echo-clone-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    expose:
      - "3000"
    volumes:
      - sqlite_data:/app/data
    depends_on:
      - ai

  ai:
    image: ghcr.io/${GHCR_OWNER}/echo-clone-ai:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    depends_on:
      - qdrant
      - ollama

  qdrant:
    image: qdrant/qdrant:v1.12.4
    restart: unless-stopped
    expose:
      - "6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  ollama:
    image: ollama/ollama:0.3.14
    restart: unless-stopped
    expose:
      - "11434"
    volumes:
      - ollama_storage:/root/.ollama

  ingest:
    image: ghcr.io/${GHCR_OWNER}/echo-clone-ingest:${IMAGE_TAG:-latest}
    profiles:
      - tools
    env_file: .env
    volumes:
      - ./content/knowledge:/app/content/knowledge:ro
    depends_on:
      - qdrant
      - ollama

volumes:
  qdrant_storage:
  ollama_storage:
  sqlite_data:
  caddy_data:
  caddy_config:
